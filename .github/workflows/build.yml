name: Build CardExia Doc-Manager

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build macOS App
      run: |
        pyinstaller --noconfirm --onedir --windowed --icon=icon.ico --name "CardExia_DocManager" --osx-bundle-identifier "com.gubun.cardexia" src/main.py
        
    - name: Inject macOS Permissions
      run: |
        PLIST_FILE="dist/CardExia_DocManager.app/Contents/Info.plist"
        /usr/libexec/PlistBuddy -c "Add :NSDesktopFolderUsageDescription string 'CardExia requiere acceso al Escritorio para indexar tus documentos.'" "$PLIST_FILE"
        /usr/libexec/PlistBuddy -c "Add :NSDocumentsFolderUsageDescription string 'CardExia requiere acceso a Documentos para su motor de búsqueda predictiva.'" "$PLIST_FILE"
        /usr/libexec/PlistBuddy -c "Add :NSDownloadsFolderUsageDescription string 'CardExia requiere acceso a Descargas para buscar archivos recientes.'" "$PLIST_FILE"
        /usr/libexec/PlistBuddy -c "Add :NSRemovableVolumesUsageDescription string 'CardExia requiere acceso a Unidades Externas para indexación universal.'" "$PLIST_FILE"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CardExia-macOS
        path: dist/CardExia_DocManager.app

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Windows Exe
      run: |
        pyinstaller --noconfirm --onedir --windowed --icon=icon.ico --name "CardExia_DocManager" src/main.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CardExia-Windows
        path: dist/CardExia_DocManager
